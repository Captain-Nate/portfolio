<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Bubble Blocker</title>
<style>
  :root{
    --bg:#0a0b16; --bg2:#12132a; --fg:#eaf0ff; --accent:#00f0ff; --panel:#171a33;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0;height:100%;}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    background:radial-gradient(120% 90% at 50% 0%, var(--bg2), var(--bg));
    color:var(--fg); display:flex; align-items:center; justify-content:center;
    transition:background .35s ease, color .35s ease;
    overflow:hidden;
  }
  #wrap{
    position:relative; width:100%; max-width:440px; height:100vh; max-height:820px;
    display:flex; flex-direction:column;
  }
  header{
    display:flex; align-items:center; gap:12px; padding:14px 16px 8px;
  }
  .brand{font-weight:800; font-size:20px; letter-spacing:.5px;}
  .brand span{color:var(--accent);}
  .score{
    margin-left:auto; font-weight:800; font-size:20px; font-variant-numeric:tabular-nums;
    min-width:60px; text-align:right;
  }
  .icon{
    border:none; background:var(--panel); color:var(--fg); width:40px;height:40px;
    border-radius:12px; font-size:18px; cursor:pointer; display:grid;place-items:center;
    box-shadow:0 2px 10px rgba(0,0,0,.25);
  }
  canvas{flex:1; width:100%; display:block; touch-action:none;}

  .overlay{
    position:absolute; inset:0; display:flex; flex-direction:column;
    align-items:center; justify-content:center; gap:16px; text-align:center;
    background:rgba(0,0,0,.55); backdrop-filter:blur(6px); z-index:20; padding:24px;
  }
  .overlay h2{font-size:34px; margin:0;}
  .overlay p{margin:0; opacity:.85;}
  .btn{
    border:none; background:var(--accent); color:#08111a; font-weight:800; font-size:17px;
    padding:14px 30px; border-radius:14px; cursor:pointer; box-shadow:0 6px 20px rgba(0,0,0,.3);
  }
  .hidden{display:none !important;}

  /* theme sheet */
  .scrim{position:absolute; inset:0; background:rgba(0,0,0,.5); z-index:30;}
  .sheet{
    position:absolute; left:0; right:0; bottom:0; z-index:31;
    background:var(--panel); border-radius:22px 22px 0 0; padding:18px 16px 26px;
    box-shadow:0 -10px 40px rgba(0,0,0,.4); animation:slideup .28s ease;
  }
  @keyframes slideup{from{transform:translateY(100%);}to{transform:translateY(0);}}
  .sheet h3{margin:2px 4px 14px; font-size:18px;}
  .cards{display:flex; flex-direction:column; gap:10px;}
  .card{
    display:flex; align-items:center; gap:14px; padding:12px; border-radius:16px;
    background:rgba(255,255,255,.06); border:2px solid transparent; cursor:pointer;
  }
  .card.active{border-color:var(--accent);}
  .swatches{display:flex; gap:5px;}
  .sw{width:20px;height:20px;border-radius:50%;}
  .cardtext{flex:1;}
  .cardtext b{display:block; font-size:16px;}
  .cardtext small{opacity:.7;}
  .pill{
    font-weight:800; font-size:13px; padding:8px 14px; border-radius:999px;
    background:var(--accent); color:#08111a; border:none; cursor:pointer; white-space:nowrap;
  }
  .pill.owned{background:rgba(255,255,255,.14); color:var(--fg);}
</style>
</head>
<body>
<div id="wrap">
  <header>
    <div class="brand">Bubble<span>Blocker</span></div>
    <div class="score" id="score">0</div>
    <button class="icon" id="themeBtn" aria-label="Themes">🎨</button>
  </header>
  <canvas id="c"></canvas>

  <div class="overlay hidden" id="msg">
    <h2 id="msgTitle">Game Over</h2>
    <p id="msgSub">Score 0</p>
    <button class="btn" id="again">Play Again</button>
  </div>

  <div class="scrim hidden" id="scrim"></div>
  <div class="sheet hidden" id="sheet">
    <h3>Themes</h3>
    <div class="cards" id="cards"></div>
  </div>
</div>

<script>
(function(){
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');
  const COLS = 11, ROWS = 14;
  const TAU = Math.PI*2;

  // ---------- themes ----------
  const THEMES = {
    neon:{ name:'Neon', style:'neon', price:null, free:true,
      vars:{'--bg':'#0a0b16','--bg2':'#141634','--fg':'#eaf0ff','--accent':'#00f0ff','--panel':'#171a33'},
      palette:['#00f0ff','#ff3ec8','#b6ff3c','#ffe14d','#ff6a3d','#9b7bff'] },
    matte:{ name:'Matte', style:'matte', price:'$1.99', free:false,
      vars:{'--bg':'#f4eee2','--bg2':'#efe7d6','--fg':'#2c2a26','--accent':'#e07a5f','--panel':'#fffdf8'},
      palette:['#ef6f6c','#2ec4b6','#4d8bff','#f4c95d','#9d6bd8','#5fbd6b'] },
    clear:{ name:'Clear', style:'clear', price:'$1.99', free:false,
      vars:{'--bg':'#e7f0fa','--bg2':'#d7e6f6','--fg':'#20303f','--accent':'#3d7edb','--panel':'#ffffff'},
      palette:['#22b8d6','#f05fb0','#7ad13f','#f2c53d','#6b8bff','#ff8a4d'] },
  };
  let owned = JSON.parse(localStorage.getItem('bb_owned')||'["neon"]');
  let themeKey = localStorage.getItem('bb_theme')||'neon';
  if(!owned.includes(themeKey)) themeKey='neon';

  function saveMeta(){ localStorage.setItem('bb_owned',JSON.stringify(owned)); localStorage.setItem('bb_theme',themeKey); }
  function theme(){ return THEMES[themeKey]; }

  function applyTheme(k){
    themeKey=k; saveMeta();
    const v=THEMES[k].vars;
    for(const key in v) document.documentElement.style.setProperty(key,v[key]);
    renderCards();
  }

  // hex shade helper (amt>0 lighten toward white, <0 darken)
  function shade(hex,amt){
    const n=parseInt(hex.slice(1),16); let r=(n>>16)&255,g=(n>>8)&255,b=n&255;
    const t=amt<0?0:255, p=Math.abs(amt);
    r=Math.round(r+(t-r)*p); g=Math.round(g+(t-g)*p); b=Math.round(b+(t-b)*p);
    return 'rgb('+r+','+g+','+b+')';
  }

  // ---------- geometry / state ----------
  let W,H,DPR,r,rowH,shooterX,shooterY,lossY;
  let grid=[];              // grid[row][col] = colorIndex or -1
  let current=0,next=0;
  let aim={x:0,y:0,active:false,has:false};
  let flying=null;          // {x,y,vx,vy,ci}
  let pops=[];              // pop animations
  let score=0, over=false, won=false;
  const SPEED=11;

  function rowLen(row){ return row%2 ? COLS-1 : COLS; }
  function cellX(row,col){ return (row%2? 2*r : r) + col*2*r; }
  function cellY(row){ return r + row*rowH; }

  function resize(){
    const rect=canvas.getBoundingClientRect();
    DPR=Math.min(window.devicePixelRatio||1,2);
    canvas.width=rect.width*DPR; canvas.height=rect.height*DPR;
    W=rect.width; H=rect.height;
    ctx.setTransform(DPR,0,0,DPR,0,0);
    r=W/(2*COLS); rowH=r*Math.sqrt(3);
    shooterX=W/2; shooterY=H-r*2.4; lossY=shooterY-r*2.4;
  }

  function newGame(){
    grid=[];
    for(let row=0;row<ROWS;row++){
      const rowArr=[];
      for(let col=0;col<rowLen(row);col++){
        rowArr.push(row<5 ? (Math.random()*5|0) : -1); // 5 start colors, rows 0-4
      }
      grid.push(rowArr);
    }
    score=0; over=false; won=false; flying=null; pops=[];
    current=pickColor(); next=pickColor();
    document.getElementById('msg').classList.add('hidden');
    document.getElementById('score').textContent='0';
  }

  function colorsInGrid(){
    const s=new Set();
    for(let row=0;row<ROWS;row++) for(let col=0;col<grid[row].length;col++)
      if(grid[row][col]>=0) s.add(grid[row][col]);
    return [...s];
  }
  function pickColor(){
    const c=colorsInGrid();
    if(c.length===0) return Math.random()*5|0;
    return c[Math.random()*c.length|0];
  }

  // ---------- neighbors / matching ----------
  function neighbors(row,col){
    const odd=row%2;
    const list=[[row,col-1],[row,col+1]];
    if(odd){ list.push([row-1,col],[row-1,col+1],[row+1,col],[row+1,col+1]); }
    else   { list.push([row-1,col-1],[row-1,col],[row+1,col-1],[row+1,col]); }
    return list.filter(([rr,cc])=> rr>=0 && rr<ROWS && cc>=0 && cc<grid[rr].length);
  }
  function hasFilledNeighbor(row,col){
    return neighbors(row,col).some(([rr,cc])=>grid[rr][cc]>=0);
  }

  function place(x,y,ci){
    // nearest attachable empty cell to (x,y)
    let best=null,bd=Infinity;
    for(let row=0;row<ROWS;row++) for(let col=0;col<grid[row].length;col++){
      if(grid[row][col]!==-1) continue;
      if(row!==0 && !hasFilledNeighbor(row,col)) continue;
      const dx=x-cellX(row,col), dy=y-cellY(row,col), d=dx*dx+dy*dy;
      if(d<bd){bd=d;best=[row,col];}
    }
    if(!best) return;
    const [row,col]=best; grid[row][col]=ci;
    resolve(row,col,ci);
  }

  function resolve(row,col,ci){
    // flood fill same color
    const seen=new Set(), stack=[[row,col]], cluster=[];
    seen.add(row+','+col);
    while(stack.length){
      const [rr,cc]=stack.pop(); cluster.push([rr,cc]);
      for(const [nr,nc] of neighbors(rr,cc)){
        const k=nr+','+nc;
        if(!seen.has(k) && grid[nr][nc]===ci){ seen.add(k); stack.push([nr,nc]); }
      }
    }
    if(cluster.length>=3){
      for(const [rr,cc] of cluster){ popCell(rr,cc); grid[rr][cc]=-1; }
      score+=cluster.length*10;
      dropFloating();
    } else {
      // no pop — check loss
      if(cellY(row)+r>=lossY){ over=true; showMsg('Blocked!','Score '+score); }
    }
    if(colorsInGrid().length===0 && !over){ won=true; over=true; showMsg('Cleared!','Score '+score); }
    document.getElementById('score').textContent=score;
  }

  function dropFloating(){
    const anchored=new Set();
    // BFS from row 0
    const stack=[];
    for(let col=0;col<grid[0].length;col++) if(grid[0][col]>=0){ anchored.add('0,'+col); stack.push([0,col]); }
    while(stack.length){
      const [rr,cc]=stack.pop();
      for(const [nr,nc] of neighbors(rr,cc)){
        const k=nr+','+nc;
        if(!anchored.has(k) && grid[nr][nc]>=0){ anchored.add(k); stack.push([nr,nc]); }
      }
    }
    let dropped=0;
    for(let row=0;row<ROWS;row++) for(let col=0;col<grid[row].length;col++){
      if(grid[row][col]>=0 && !anchored.has(row+','+col)){
        popCell(row,col,true); grid[row][col]=-1; dropped++;
      }
    }
    if(dropped) score+=dropped*20;
  }

  function popCell(row,col,drop){
    pops.push({x:cellX(row,col),y:cellY(row),ci:grid[row][col],t:0,drop:!!drop,vy:drop?1.5:0});
  }

  // ---------- shooting ----------
  function fire(){
    if(flying||over) return;
    let ang=Math.atan2(aim.y-shooterY, aim.x-shooterX);
    const min=-Math.PI+0.18, max=-0.18;              // keep it pointing up
    if(ang>max && ang<0) ang=max;
    if(ang<min && ang>-Math.PI) ang=min;
    if(ang>=0) return;                                // never shoot downward
    flying={x:shooterX,y:shooterY,vx:Math.cos(ang)*SPEED,vy:Math.sin(ang)*SPEED,ci:current};
    current=next; next=pickColor(); aim.has=false;
  }

  function hitsGrid(x,y){
    const thr=(2*r*0.9)**2;
    const rrow=Math.max(0,Math.round((y-r)/rowH)-1);
    for(let row=rrow;row<Math.min(ROWS,rrow+4);row++)
      for(let col=0;col<grid[row].length;col++){
        if(grid[row][col]<0) continue;
        const dx=x-cellX(row,col), dy=y-cellY(row);
        if(dx*dx+dy*dy<thr) return true;
      }
    return false;
  }

  function step(){
    if(flying){
      const sub=6;
      for(let s=0;s<sub&&flying;s++){
        flying.x+=flying.vx/sub; flying.y+=flying.vy/sub;
        if(flying.x<r){flying.x=r;flying.vx*=-1;}
        if(flying.x>W-r){flying.x=W-r;flying.vx*=-1;}
        if(flying.y<=r){ place(flying.x,r,flying.ci); flying=null; break; }
        if(hitsGrid(flying.x,flying.y)){ place(flying.x,flying.y,flying.ci); flying=null; break; }
      }
    }
    for(let i=pops.length-1;i>=0;i--){
      const p=pops[i]; p.t+=0.06;
      if(p.drop){ p.vy+=0.6; p.y+=p.vy; }
      if(p.t>=1||p.y>H+40) pops.splice(i,1);
    }
  }

  // ---------- rendering ----------
  function circle(x,y,rad){ ctx.beginPath(); ctx.arc(x,y,rad,0,TAU); }

  function drawBubble(x,y,rad,ci,alpha){
    const th=theme(), col=th.palette[ci];
    ctx.save();
    if(alpha!=null) ctx.globalAlpha=alpha;
    if(th.style==='neon'){
      ctx.shadowColor=col; ctx.shadowBlur=rad*0.8;
      ctx.fillStyle=col; circle(x,y,rad*0.98); ctx.fill();
      ctx.shadowBlur=0;
      ctx.fillStyle=shade(col,-0.28); circle(x,y,rad*0.6); ctx.fill();
      ctx.fillStyle=col; circle(x,y,rad*0.42); ctx.fill();
      ctx.fillStyle='rgba(255,255,255,.85)'; circle(x-rad*0.3,y-rad*0.32,rad*0.15); ctx.fill();
    } else if(th.style==='matte'){
      ctx.fillStyle='rgba(0,0,0,.10)'; circle(x,y+rad*0.14,rad*0.98); ctx.fill();
      ctx.fillStyle=col; circle(x,y,rad*0.96); ctx.fill();
      ctx.lineWidth=rad*0.15; ctx.strokeStyle=shade(col,-0.18); circle(x,y,rad*0.88); ctx.stroke();
      ctx.fillStyle='rgba(255,255,255,.22)'; circle(x-rad*0.28,y-rad*0.3,rad*0.3); ctx.fill();
    } else { // clear glass
      ctx.globalAlpha=(alpha!=null?alpha:1)*0.45; ctx.fillStyle=col; circle(x,y,rad*0.96); ctx.fill();
      ctx.globalAlpha=(alpha!=null?alpha:1);
      ctx.lineWidth=rad*0.14; ctx.strokeStyle=col; circle(x,y,rad*0.88); ctx.stroke();
      ctx.fillStyle='rgba(255,255,255,.75)';
      ctx.beginPath(); ctx.ellipse(x-rad*0.28,y-rad*0.34,rad*0.26,rad*0.15,-0.5,0,TAU); ctx.fill();
      ctx.fillStyle='rgba(255,255,255,.3)'; circle(x+rad*0.24,y+rad*0.26,rad*0.12); ctx.fill();
    }
    ctx.restore();
  }

  function drawAim(){
    if(flying||over) return;
    const acc=getComputedStyle(document.documentElement).getPropertyValue('--accent').trim();
    let ang=Math.atan2((aim.has?aim.y:shooterY-100)-shooterY,(aim.has?aim.x:shooterX)-shooterX);
    const max=-0.18,min=-Math.PI+0.18;
    ang=Math.max(min,Math.min(max,ang));
    // predicted path with wall bounces
    let x=shooterX,y=shooterY,vx=Math.cos(ang),vy=Math.sin(ang);
    ctx.save(); ctx.strokeStyle=acc; ctx.globalAlpha=.5; ctx.lineWidth=2.5; ctx.setLineDash([2,10]); ctx.lineCap='round';
    ctx.beginPath(); ctx.moveTo(x,y);
    for(let i=0;i<400;i++){
      x+=vx*4; y+=vy*4;
      if(x<r){x=r;vx*=-1;} if(x>W-r){x=W-r;vx*=-1;}
      ctx.lineTo(x,y);
      if(y<=r||hitsGrid(x,y)) break;
    }
    ctx.stroke(); ctx.restore();
  }

  function render(){
    ctx.clearRect(0,0,W,H);
    // grid
    for(let row=0;row<ROWS;row++) for(let col=0;col<grid[row].length;col++)
      if(grid[row][col]>=0) drawBubble(cellX(row,col),cellY(row),r,grid[row][col]);
    // pops
    for(const p of pops){
      const scale=p.drop?1:1+p.t*0.8;
      drawBubble(p.x,p.y,r*scale,p.ci,1-p.t);
    }
    // loss line
    const acc=getComputedStyle(document.documentElement).getPropertyValue('--accent').trim();
    ctx.save(); ctx.strokeStyle=acc; ctx.globalAlpha=.25; ctx.setLineDash([6,8]); ctx.lineWidth=2;
    ctx.beginPath(); ctx.moveTo(0,lossY); ctx.lineTo(W,lossY); ctx.stroke(); ctx.restore();
    // aim + shooter
    drawAim();
    if(flying) drawBubble(flying.x,flying.y,r,flying.ci);
    if(!over){
      drawBubble(shooterX,shooterY,r*1.08,current);
      drawBubble(W-r*1.4,shooterY+r*0.2,r*0.62,next,0.9); // next preview
    }
  }

  function loop(){ step(); render(); requestAnimationFrame(loop); }

  function showMsg(t,s){
    document.getElementById('msgTitle').textContent=t;
    document.getElementById('msgSub').textContent=s;
    document.getElementById('msg').classList.remove('hidden');
  }

  // ---------- input ----------
  function pt(e){ const rect=canvas.getBoundingClientRect(); const t=e.touches?e.touches[0]:e; return {x:t.clientX-rect.left,y:t.clientY-rect.top}; }
  canvas.addEventListener('pointerdown',e=>{ const p=pt(e); aim.x=p.x;aim.y=p.y;aim.has=true;aim.active=true; });
  canvas.addEventListener('pointermove',e=>{ if(!aim.active&&e.buttons===0){ const p=pt(e); aim.x=p.x;aim.y=p.y;aim.has=true; return;} if(aim.active){ const p=pt(e); aim.x=p.x;aim.y=p.y;aim.has=true; } });
  window.addEventListener('pointerup',()=>{ if(aim.active){ fire(); aim.active=false; } });

  // ---------- theme sheet ----------
  const sheet=document.getElementById('sheet'), scrim=document.getElementById('scrim'), cardsEl=document.getElementById('cards');
  function openSheet(){ sheet.classList.remove('hidden'); scrim.classList.remove('hidden'); renderCards(); }
  function closeSheet(){ sheet.classList.add('hidden'); scrim.classList.add('hidden'); }
  document.getElementById('themeBtn').addEventListener('click',openSheet);
  scrim.addEventListener('click',closeSheet);

  function renderCards(){
    cardsEl.innerHTML='';
    for(const k in THEMES){
      const th=THEMES[k], have=owned.includes(k), active=themeKey===k;
      const card=document.createElement('div'); card.className='card'+(active?' active':'');
      const sw=th.palette.slice(0,5).map(c=>`<span class="sw" style="background:${c}"></span>`).join('');
      card.innerHTML=`
        <div class="swatches">${sw}</div>
        <div class="cardtext"><b>${th.name}</b><small>${th.free?'Free':'Premium theme'}</small></div>
        <button class="pill ${have?'owned':''}">${active?'Applied':have?'Apply':th.price}</button>`;
      const pill=card.querySelector('.pill');
      pill.addEventListener('click',ev=>{
        ev.stopPropagation();
        if(!have){ owned.push(k); saveMeta(); }   // <-- mock purchase; becomes OMS_IAP.buyTheme() in the app
        applyTheme(k);
      });
      card.addEventListener('click',()=>{ if(owned.includes(k)) applyTheme(k); });
      cardsEl.appendChild(card);
    }
  }

  document.getElementById('again').addEventListener('click',newGame);
  window.addEventListener('resize',()=>{ resize(); });

  // ---------- boot ----------
  applyTheme(themeKey);
  resize(); newGame(); loop();
})();
</script>
</body>
</html>
